services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tokyo_listings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tokyo_listings"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_LISTEN_PORT:-4001}:4001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tokyo_listings
      API_LISTEN_PORT: "4001"
      # BETTER_AUTH_SECRET comes from `env_file` (root `.env`); do not override with empty compose interpolation.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        API_DEV_ORIGIN: http://api:4001
        NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:-}
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
    env_file:
      - ../.env
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      API_DEV_ORIGIN: http://api:4001
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:-}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
